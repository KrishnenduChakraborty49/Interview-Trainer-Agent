version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: interview_trainer_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: interview_trainer
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - agent_network

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview_trainer_backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/interview_trainer
      DB_PASSWORD: ${DB_PASSWORD:-root}
      IBM_CLOUD_API_KEY: ${IBM_CLOUD_API_KEY}
      IBM_WATSONX_PROJECT_ID: ${IBM_WATSONX_PROJECT_ID}
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    networks:
      - agent_network

  frontend-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interview_trainer_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend-api
    networks:
      - agent_network

volumes:
  db_data:

networks:
  agent_network:
    driver: bridge
